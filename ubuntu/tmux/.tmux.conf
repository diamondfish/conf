# -----------------------------------------------------------------------------
# Terminal capabilities
# -----------------------------------------------------------------------------
# Use a known-good terminal type inside tmux. Pre-declaring features (rather
# than letting tmux probe for them) avoids a Windows Terminal + ConPTY race
# where probe responses (Primary/Secondary DA, OSC 10/11) leak into the shell
# as text. Requires tmux 3.2+.
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-256color:hyperlinks"

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------
# Enable the mouse for scrolling, selecting, and clicking
set -g mouse on

# Start window numbering at 1 (instead of 0) to match your keyboard layout
set -g base-index 1

# Increase scrollback history (standard is only 2000 lines)
set -g history-limit 10000

# Don't rename windows automatically (keeps your names permanent)
set-option -g allow-rename off

# Lower the delay for the 'Esc' key (improves responsiveness)
set -s escape-time 0

# Bind F10 to detach the session without needing the prefix
bind-key -n F10 detach-client

# Send mouse selections to the outer terminal's clipboard via OSC 52.
# Windows Terminal forwards this to the Windows clipboard automatically.
set -g set-clipboard on

# -----------------------------------------------------------------------------
# Status bar
# -----------------------------------------------------------------------------
# Enable two status bar lines
set -g status 2

# Set the global background styling
set -g status-style bg=default,fg=black

# Row 1: The Margin
# We use fill=default to force the "transparency" across the entire width
set -g 'status-format[0]' '#[bg=default]#[fill=default]'

# Row 2: The Info Bar
# Define the different parts of the info bar
%if #{==:#{host},#{host}}
  SESSION="#[bg=grey,fg=black,bold][#S]#[nobold]"
  WINDOW="#[fg=black]#W"
  FILLER="#[fill=grey align=right]"
  SHORTCUTS="#[bold]F10#[nobold]:Detach"
%endif

# Note: We use double quotes so the shell variables expand
set -g 'status-format[1]' "${SESSION} ${WINDOW} ${FILLER}${SHORTCUTS} "
